<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trans-gradient-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BCEFA" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F5A9B8" />
    </linearGradient>
    <linearGradient id="trans-gradient-diagonal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BCEFA" />
      <stop offset="100%" stop-color="#F5A9B8" />
    </linearGradient>
    <linearGradient id="wing-blue-gradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#91DEFF" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#5BCEFA" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#3BA8D4" stop-opacity="0.85" />
    </linearGradient>
    <linearGradient id="wing-pink-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD4E0" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#F5A9B8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#D4849A" stop-opacity="0.85" />
    </linearGradient>
  </defs>

  <!-- Background circle for maskable icon -->
  <circle cx="32" cy="32" r="32" fill="#0D0D0F" />

  <g transform="translate(0, 2)">
    <!-- Left upper wing -->
    <path d="M28 30 C16 18, 6 20, 8 30 C10 40, 18 38, 28 32" fill="url(#wing-blue-gradient)" />
    <!-- Left lower wing -->
    <path d="M28 34 C18 38, 10 44, 14 50 C18 56, 26 50, 28 36" fill="#5BCEFA" fill-opacity="0.75" />

    <!-- Right upper wing -->
    <path d="M36 30 C48 18, 58 20, 56 30 C54 40, 46 38, 36 32" fill="url(#wing-pink-gradient)" />
    <!-- Right lower wing -->
    <path d="M36 34 C46 38, 54 44, 50 50 C46 56, 38 50, 36 36" fill="#F5A9B8" fill-opacity="0.75" />

    <!-- Wing details -->
    <circle cx="18" cy="28" r="3" fill="#91DEFF" fill-opacity="0.5" />
    <circle cx="46" cy="28" r="3" fill="#FFD4E0" fill-opacity="0.5" />
    <circle cx="16" cy="46" r="2" fill="#5BCEFA" fill-opacity="0.4" />
    <circle cx="48" cy="46" r="2" fill="#F5A9B8" fill-opacity="0.4" />

    <!-- Body -->
    <ellipse cx="32" cy="34" rx="3.5" ry="16" fill="url(#trans-gradient-body)" />

    <!-- Head -->
    <circle cx="32" cy="16" r="4" fill="url(#trans-gradient-diagonal)" />

    <!-- Antennae -->
    <path d="M30 14 Q26 8, 22 6" stroke="url(#trans-gradient-diagonal)" stroke-width="1.5" fill="none" stroke-linecap="round" />
    <path d="M34 14 Q38 8, 42 6" stroke="url(#trans-gradient-diagonal)" stroke-width="1.5" fill="none" stroke-linecap="round" />

    <!-- Antenna tips -->
    <circle cx="22" cy="6" r="1.5" fill="#5BCEFA" />
    <circle cx="42" cy="6" r="1.5" fill="#F5A9B8" />
  </g>
</svg>
